<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNES Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="emulator-container">
        <div class="controls" style="margin-bottom: 20px; text-align: center;">
            <label for="rom-upload" style="cursor: pointer; background: #333; padding: 10px 20px; border-radius: 5px; border: 1px solid #555;">
                Load .NES File
            </label>
            <input type="file" id="rom-upload" accept=".nes" style="display: none;" />
        </div>

        <canvas id="nes-canvas" width="256" height="240"></canvas>
    </div>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
